<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" width="260" height="64" role="img" aria-label="Break The Silence">
  <style>
    .bar { fill: #4a1f4d; }
    .wordmark {
      fill: #4a1f4d;
      font-family: "Arial Narrow", "Arial Black", Impact, system-ui, sans-serif;
      font-weight: 800;
      font-size: 25px;
      letter-spacing: 0.5px;
    }
  </style>

  <!-- Left bar cluster -->
  <g class="bar">
    <rect x="2"  y="8" width="3.5" height="48"/>
    <rect x="9"  y="8" width="3.5" height="48"/>
    <rect x="16" y="8" width="3.5" height="48"/>
    <rect x="23" y="8" width="3.5" height="48"/>
  </g>

  <!-- Right bar cluster -->
  <g class="bar">
    <rect x="232" y="8" width="3.5" height="48"/>
    <rect x="239" y="8" width="3.5" height="48"/>
    <rect x="246" y="8" width="3.5" height="48"/>
    <rect x="253" y="8" width="3.5" height="48"/>
  </g>

  <!-- Wordmark, two stacked lines, condensed -->
  <g transform="translate(130 0) scale(0.92 1) translate(-130 0)">
    <text class="wordmark" x="130" y="29" text-anchor="middle">BREAK THE</text>
    <text class="wordmark" x="130" y="54" text-anchor="middle">SILENCE</text>
  </g>
</svg>
